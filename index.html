<!DOCTYPE html>
<html>
<head>
    <title>Level 2 Task 1</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-4">

    <h1 class="text-center mb-4">Responsive Card Layout</h1>

    <!-- Grid Row -->
    <div class="row">

        <!-- Card 1 -->
        <div class="col-md-4">
            <div class="card">
                <img src="https://picsum.photos/300/200" class="card-img-top">
                <div class="card-body">
                    <h5 class="card-title">Card 1</h5>
                    <p class="card-text">This is a simple card using Bootstrap.</p>
                </div>
            </div>
        </div>

        <!-- Card 2 -->
        <div class="col-md-4">
            <div class="card">
                <img src="https://picsum.photos/301/200" class="card-img-top">
                <div class="card-body">
                    <h5 class="card-title">Card 2</h5>
                    <p class="card-text">Responsive design using grid system.</p>
                </div>
            </div>
        </div>

        <!-- Card 3 -->
        <div class="col-md-4">
            <div class="card">
                <img src="https://picsum.photos/302/200" class="card-img-top">
                <div class="card-body">
                    <h5 class="card-title">Card 3</h5>
                    <p class="card-text">Works on mobile, tablet, and desktop.</p>
                </div>
            </div>
        </div>

    </div>

</div>

</html>
